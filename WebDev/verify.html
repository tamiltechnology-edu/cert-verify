<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Verification | Tamil Technology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <!-- GSAP for smooth entrance -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --card-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
      --success-bg: #f0fdf4;
      --error-bg: #fef2f2;
    }

    body {
      background-color: #fcfcfd;
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.03) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(245, 158, 11, 0.03) 0px, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      margin: 0;
    }
    
    .verify-container {
      max-width: 540px;
      width: 100%;
      background: var(--white);
      border-radius: 32px;
      padding: 60px 48px;
      box-shadow: var(--card-shadow);
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 0, 0, 0.05);
      opacity: 0;
      transform: translateY(20px);
    }
    
    .verify-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 8px;
      background: linear-gradient(90deg, var(--blue), var(--accent), var(--pink));
    }

    .brand-header {
      margin-bottom: 32px;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }
    
    .status-badge.loading { background: var(--light-gray); color: var(--gray); }
    .status-badge.success { background: #dcfce7; color: #166534; }
    .status-badge.error { background: #fee2e2; color: #991b1b; }

    .status-icon {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 32px;
      position: relative;
    }
    
    .status-icon.loading {
      background: var(--light-gray);
      color: var(--gray);
      animation: pulse 2s infinite ease-in-out;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
    }
    
    .status-icon.success { background: var(--success-bg); color: var(--green); }
    .status-icon.error { background: var(--error-bg); color: var(--red); }

    .status-icon .seal-overlay {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 32px;
      height: 32px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      border: 3px solid var(--white);
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }
    
    .cert-id-tag {
      font-size: 0.85rem;
      color: var(--gray);
      font-weight: 600;
      margin-bottom: 40px;
    }

    /* Verification Details Table */
    .details-table {
      width: 100%;
      background: #fafafa;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 40px;
      text-align: left;
      display: none;
      border: 1px solid rgba(0,0,0,0.02);
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    
    .detail-row:last-child { border-bottom: none; }
    
    .detail-label { font-size: 0.75rem; color: var(--gray); font-weight: 500; text-transform: uppercase; }
    .detail-value { font-size: 0.88rem; color: var(--dark); font-weight: 700; }

    .result-text {
      font-size: 1rem;
      color: var(--gray);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .btn-professional {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--dark);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      border: none;
      cursor: pointer;
    }
    
    .btn-professional:hover {
      background: #000;
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
    }

    .btn-outline {
      background: transparent;
      color: var(--gray);
      border: 2px solid var(--border);
    }
    
    .btn-outline:hover {
      background: var(--light-gray);
      color: var(--dark);
      border-color: var(--dark);
    }

    .verified-seal {
      margin-top: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0.6;
    }
    
    .verified-seal img { height: 28px; }
    .verified-seal span { font-size: 0.7rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.1em; }
  </style>
</head>
<body>

  <div class="verify-container" id="mainContainer">
    <div class="brand-header">
      <img src="assets/logo.png" alt="Tamil Technology" style="height: 32px; margin-bottom: 8px;">
    </div>

    <div id="statusBadge" class="status-badge loading">
      <i class="fas fa-circle-notch fa-spin"></i> Checking Record
    </div>

    <div id="statusIcon" class="status-icon loading">
      <i class="fas fa-shield-alt"></i>
      <div id="sealOverlay" class="seal-overlay" style="display:none;"><i class="fas fa-check"></i></div>
    </div>
    
    <h1 id="statusTitle">Authenticating...</h1>
    <div id="certIdTag" class="cert-id-tag">REF: ...</div>
    
    <p id="resultText" class="result-text">
      Please wait while our secure servers verify the cryptographic signature of this certificate.
    </p>

    <!-- Detailed Info (Visible on Success) -->
    <div id="detailsTable" class="details-table">
      <div class="detail-row">
        <span class="detail-label">Issued To</span>
        <span class="detail-value" id="studentNameVal">---</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Issue Date</span>
        <span class="detail-value" id="issueDateVal">---</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Course</span>
        <span class="detail-value">Web Development Bootcamp</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Authority</span>
        <span class="detail-value">Tamil Technology</span>
      </div>
    </div>
    
    <div class="btn-group">
      <a href="index.html" class="btn-professional">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
      <button class="btn-professional btn-outline" onclick="window.print()">
        <i class="fas fa-print"></i> Print Verification
      </button>
    </div>

    <div class="verified-seal">
      <span>Official Verification System</span>
    </div>
  </div>

  <script>
    // Animations
    window.addEventListener('DOMContentLoaded', () => {
      gsap.to('#mainContainer', { opacity: 1, y: 0, duration: 0.8, ease: "power4.out" });
    });

    const urlParams = new URLSearchParams(window.location.search);
    const certId = urlParams.get('cert-id');
    
    const statusIcon = document.getElementById('statusIcon');
    const statusBadge = document.getElementById('statusBadge');
    const statusTitle = document.getElementById('statusTitle');
    const certIdTag = document.getElementById('certIdTag');
    const resultText = document.getElementById('resultText');
    const detailsTable = document.getElementById('detailsTable');
    const sealOverlay = document.getElementById('sealOverlay');

    if (!certId) {
      updateUI('error', 'Missing Reference', 'No valid certificate reference ID was found in the request.');
    } else {
      const displayId = certId.trim().toUpperCase();
      certIdTag.innerText = `REF: ${displayId}`;
      
      const sheetId = '2PACX-1vSHOXu3E6VoYPzh261vwd7jjjf4IUhMqxrwLOezN-jJELfNGZMZAu_qGEs1U90J-zCd0-aveZroj5N_';
      const sheetUrl = `https://docs.google.com/spreadsheets/d/e/${sheetId}/pub?output=csv`;

      // Simulating a professional delay
      setTimeout(() => {
        fetch(sheetUrl)
          .then(response => {
            if (!response.ok) throw new Error('Fetch failed');
            return response.text();
          })
          .then(csvData => {
            const rows = csvData.split(/\r?\n/).map(r => r.trim()).filter(r => r.length > 0);
            
            if (rows.length <= 1) {
              updateUI('error', 'Database Offline', 'The verification database is currently being updated.');
              return;
            }

            // Identify columns by header
            const header = rows[0].split(',').map(h => h.toLowerCase().trim());
            const idIdx = header.findIndex(h => h.includes('id') || h.includes('cert'));
            const nameIdx = header.findIndex(h => h.includes('name'));
            const timeIdx = header.findIndex(h => h.includes('time'));

            let foundRow = null;
            const searchId = certId.trim().toLowerCase();

            for (let i = 1; i < rows.length; i++) {
              const cols = rows[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
              
              // Smart Match: Check primary column or any column if needed
              const matchIdx = cols.findIndex(c => c.toLowerCase() === searchId);
              if (matchIdx !== -1) {
                foundRow = {
                  name: cols[nameIdx] || cols[0],
                  id: cols[idIdx] || cols[matchIdx],
                  date: cols[timeIdx] || "---"
                };
                break;
              }
            }

            if (foundRow) {
              document.getElementById('studentNameVal').innerText = foundRow.name;
              document.getElementById('issueDateVal').innerText = foundRow.date.split(' ')[0]; // Show only date
              updateUI('success', 'Verified Successfully', 'This certificate is authentic and has been verified by our security systems.');
            } else {
              updateUI('error', 'Validation Failed', `We could not find any official record matching ID: <strong>${displayId}</strong>.`);
            }
          })
          .catch(err => {
            console.error(err);
            updateUI('error', 'Service Error', 'Our verification gateway is temporarily unavailable.');
          });
      }, 1200);
    }

    function updateUI(type, title, message) {
      statusIcon.classList.remove('loading');
      statusBadge.classList.remove('loading');
      
      if (type === 'success') {
        statusIcon.classList.add('success');
        statusIcon.innerHTML = '<i class="fas fa-check-circle"></i><div class="seal-overlay"><i class="fas fa-check"></i></div>';
        statusBadge.classList.add('success');
        statusBadge.innerHTML = '<i class="fas fa-check-circle"></i> Verified Status';
        statusTitle.innerText = title;
        statusTitle.style.color = 'var(--green)';
        resultText.innerHTML = message;
        detailsTable.style.display = 'block';
        
        // Success animation
        gsap.from('#detailsTable', { opacity: 0, scale: 0.95, duration: 0.5, ease: "back.out(1.2)" });
      } else {
        statusIcon.classList.add('error');
        statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
        statusBadge.classList.add('error');
        statusBadge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Invalid Record';
        statusTitle.innerText = title;
        statusTitle.style.color = 'var(--red)';
        resultText.innerHTML = message;
      }
    }
  </script>
</body>
</html>
